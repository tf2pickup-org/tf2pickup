overrides:
  axios: '1.18.1'
  fast-uri: '4.1.0'
  follow-redirects: '1.16.0'
  lodash: '4.18.1'
  'minimatch@9': '10.2.5'
  'brace-expansion@2': '5.0.7'
  'brace-expansion@5': '5.0.6'
  protobufjs: '8.6.5'
  '@protobufjs/utf8': '1.1.1'
  qs: '6.15.3'

allowBuilds:
  esbuild: true
  protobufjs: true

minimumReleaseAgeExclude:
  - tsx@4.22.2

publicHoistPattern:
  - 'playwright*'
  - 'bson'
  - 'framer-motion*'
  - '@tf2pickup-org/*'
  - '@discordjs/*'
  - 'discord-api-types'
  - 'helmet'
  - '@fastify/*'
  - '@opentelemetry/*'
  - 'thread-stream'
  - 'sonic-boom'
  - 'pino-std-serializers'
